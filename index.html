<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Desk</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
 
 
 
 body {
            background-color: #e9ecef; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0;
        }
		
		
.wrapper {
	 display: flex;
	 width: 100%;
     max-width: 600px;
	 align-items: center;
	 justify-content: center;
	/* Old browsers */
	 background: -moz-linear-gradient(45deg, #7ae298 0%, #9af282 100%);
	/* FF3.6-15 */
	 background: -webkit-linear-gradient(45deg, #7ae298 0%, #9af282 100%);
	/* Chrome10-25,Safari5.1-6 */
	 background: linear-gradient(45deg, #7ae298 0%, #9af282 100%);
}
 .cube {
	 position: relative;
	 width: 650px;
	 height: 600px;
	 background-color: #fff;
	 align-items: center;
	 justify-content: center;
}
 .ants {
	 fill: black;
	 width: 25px;
	 height: 25px;
	 position: absolute;
}
 #ant1 {
	 left: 50%;
	 bottom: -60%;
	 animation: ant-1-animation 8s infinite;
}
 #ant2 {
	 left: 0;
	 bottom: -50%;
	 animation: ant-2-animation 9s infinite;
}
 #ant3 {
	 left: 100%;
	 bottom: -70%;
	 animation: ant-3-animation 12s infinite;
	 animation-delay: 1s;
}
 #ant4 {
	 left: 0;
	 bottom: -50%;
	 animation: ant-2-animation 12s infinite;
	 animation-delay: 3s;
}
 @keyframes ant-1-animation {
	 0% {
		 left: 50%;
		 bottom: -60%;
	}
	 10% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(0deg);
	}
	 12% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(-90deg);
	}
	 18% {
		 transform: rotate(-90deg);
	}
	 20% {
		 left: 5%;
		 bottom: 5%;
		 transform: rotate(-90deg);
	}
	 22% {
		 transform: rotate(0);
	}
	 32% {
		 transform: rotate(0);
	}
	 38% {
		 left: 5%;
		 bottom: 87%;
		 transform: rotate(90deg);
	}
	 50% {
		 left: 90%;
		 bottom: 87%;
		 transform: rotate(90deg);
	}
	 55% {
		 left: 90%;
		 bottom: 87%;
		 transform: rotate(230deg);
	}
	 72% {
		 left: 5%;
		 bottom: 5%;
		 transform: rotate(230deg);
	}
	 78% {
		 left: 5%;
		 bottom: 5%;
		 transform: rotate(90deg);
	}
	 85% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(90deg);
	}
	 90% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(180deg);
	}
	 100% {
		 left: 50%;
		 bottom: -60%;
		 transform: rotate(180deg);
	}
}
 @keyframes ant-2-animation {
	 0% {
		 left: 0;
		 bottom: -50%;
		 transform: rotate(45deg);
	}
	 15% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(45deg);
	}
	 18% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(90deg);
	}
	 28% {
		 left: 85%;
		 bottom: 5%;
		 transform: rotate(90deg);
	}
	 30% {
		 left: 85%;
		 bottom: 5%;
		 transform: rotate(0deg);
	}
	 40% {
		 left: 85%;
		 bottom: 85%;
		 transform: rotate(0deg);
	}
	 48% {
		 left: 85%;
		 bottom: 85%;
		 transform: rotate(-90deg);
	}
	 58% {
		 left: 5%;
		 bottom: 85%;
		 transform: rotate(-90deg);
	}
	 68% {
		 left: 5%;
		 bottom: 85%;
		 transform: rotate(-180deg);
	}
	 79% {
		 left: 5%;
		 bottom: 5%;
		 transform: rotate(-180deg);
	}
	 81% {
		 left: 5%;
		 bottom: 5%;
		 transform: rotate(-270deg);
	}
	 88% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(-270deg);
	}
	 90% {
		 left: 50%;
		 bottom: 5%;
		 transform: rotate(-140deg);
	}
	 100% {
		 left: 0%;
		 bottom: -50%;
		 transform: rotate(-140deg);
	}
}
 @keyframes ant-3-animation {
  0% {
    left: 100%;
    bottom: -70%;
    transform: rotate(-45deg);
  }
  15% {
    left: 50%;
    bottom: -15%;
    transform: rotate(-45deg);
  }
  18% {
    left: 50%;
    bottom: -15%;
    transform: rotate(-90deg);
  }
  28% {
    left: -10%;
    bottom: -15%;
    transform: rotate(-90deg);
  }
  30% {
    left: -10%;
    bottom: -15%;
    transform: rotate(0deg);
  }
  45% {
    left: -10%;
    bottom: 105%;
    transform: rotate(0deg);
  }
  48% {
    left: -10%;
    bottom: 105%;
    transform: rotate(90deg);
  }
  58% {
    left: 105%;
    bottom: 105%;
    transform: rotate(90deg);
  }
  60% {
    left: 105%;
    bottom: 105%;
    transform: rotate(180deg);
  }
  75% {
    left: 105%;
    bottom: -15%;
    transform: rotate(180deg);
  }
  81% {
    left: 105%;
    bottom: -15%;
    transform: rotate(270deg);
  }
  88% {
    left: 50%;
    bottom: -15%;
    transform: rotate(270deg);
  }
  90% {
    left: 50%;
    bottom: -15%;
    transform: rotate(180deg);
  }
  92% {
    left: 50%;
    bottom: -15%;
    transform: rotate(130deg);
  }
  100% {
    left: 100%;
    bottom: -70%;
    transform: rotate(130deg);
  }
}

 
        .form-container {
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px; 
            box-sizing: border-box;
            margin-top: 20px; 
        }
        h2 {
            color: #dc3545; /* Heartbeat color (red) */
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite; /* Animation for heartbeat effect */
        }
        @keyframes heartbeat {
            0%, 20%, 40%, 60%, 100% {
                transform: scale(1);
            }
            10% {
                transform: scale(1.1);
            }
            30% {
                transform: scale(1.05);
            }
            50% {
                transform: scale(1.1);
            }
            70% {
                transform: scale(1.05);
            }
        }
        .neon {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: 50px;
            filter: drop-shadow(0 0 5px rgba(220, 53, 69, 0.7))
                    drop-shadow(0 0 10px rgba(220, 53, 69, 0.7))
                    drop-shadow(0 0 20px rgba(220, 53, 69, 0.7));
        }
        .form-control {
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); 
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            border-color: #007bff;
        }
        .progress {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        /* Styles for screens 6.5 inches and below */
        @media (max-width: 414px) {
            .form-container {
                padding: 15px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            }
            h2 {
                font-size: 1.5rem;
            }
            input[type="submit"] {
                font-size: 1.1rem;
            }
        

    </style>
</head>
<body>
    

        <div class="form-container"> 
    <h2>HIPL SUPPORT DESK</h2>

    <svg class="neon" viewBox="0 0 600 100">
        <path fill="none" stroke="#dc3545" stroke-width="5" d="M 0 50 Q 50 10, 100 50 T 200 50 T 300 50 Q 350 10, 400 50 T 500 50 T 600 50" />
        <animate attributeName="stroke-dasharray" from="0, 600" to="600, 0" dur="1s" repeatCount="indefinite" />
        <animate attributeName="stroke-dashoffset" from="0" to="600" dur="1s" repeatCount="indefinite" />
    </svg>

    <p style="color: red; font-weight: bold;">* All fields are mandatory</p>

    <form id="requestForm" name="requestForm">
        <div class="form-group">
            <label for="name">Name: <span style="color: red">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number: <span style="color: red">*</span></label>
            <input type="text" class="form-control" id="phone" name="phone" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address: <span style="color: red">*</span></label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="plant">Plant: <span style="color: red">*</span></label>
            <select class="form-control" id="plant" name="plant" required>
                <option value="" disabled selected>Select an option</option>
                <option value="Hemraj Industries Pvt Ltd">Hemraj Industries Pvt Ltd</option>
                <option value="RadhaShyam Industries Pvt Ltd">RadhaShyam Industries Pvt Ltd</option>
                <option value="Hemraj Rice Mill">Hemraj Rice Mill</option>
                <option value="Rice Field">Rice Field Agri Industries Ltd</option>
            </select>
        </div>

        <div class="form-group">
            <label for="department">Department: <span style="color: red">*</span></label>
            <select class="form-control" id="department" name="department" required>
                <option value="" disabled selected>Select an option</option>
                <option value="HR">HR</option>
                <option value="Account & Sale">Account & Sale</option>
                <option value="Purchase">Purchase</option>
                <option value="Ref & Solvant">Ref & Solvant</option>
                <option value="Power Plant">Power Plant</option>
                <option value="Store">Store</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="form-group">
            <label for="requestType">Request Type: <span style="color: red">*</span></label>
            <select class="form-control" id="requestType" name="requestType" required>
                <option value="" disabled selected>Select an option</option>
                <option value="Software">Software</option>
                <option value="Hardware">Hardware</option>
                <option value="Camera Problem">Camera Problem</option>
                <option value="Telephone Problem">Telephone Problem</option>
                <option value="Network Problem">Network Problem</option>
                <option value="MIS /Web app Support">MIS /Web app Support</option>
            </select>
        </div>

        <div class="form-group">
            <label for="priority">Priority: <span style="color: red">*</span></label>
            <select class="form-control" id="priority" name="priority" required>
                <option value="" disabled selected>Select an option</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>

        <div class="form-group">
            <label for="requesttypeName">Work By Name: <span style="color: red">*</span></label>
            <select class="form-control" id="requesttypeName" name="requesttypeName" required>
                <option value="" disabled selected>Select an option</option>
                <option value="Subhankar">Subhankar</option>
                <option value="Binod">Binod</option>
                <option value="Goutam">Goutam</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Problem Description: <span style="color: red">*</span></label>
            <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
        </div>

        <input type="submit" class="btn btn-primary btn-block" value="Submit">
        <div class="progress" style="display: none;">Submitting your request...</div>
    </form>

    <dialog id="submissionDialog">
        <p>Form submitted successfully!</p>
        <button id="closeDialogButton" class="btn btn-secondary">Close</button>
    </dialog>
</div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        const dialog = document.getElementById('submissionDialog');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPXBRq1sIyR-ch6rG8YfBLG9vpZE8FvKX89bkzCCZ0pVfRPTNHkR3QEVslA1FbV-IA4g/exec';
        const form = document.forms['requestForm'];

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.querySelector('.progress').style.display = 'block';
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    alert('Success!');
                    form.reset();
                    dialog.showModal();
                    document.getElementById('requestForm').style.display = 'none';
                    document.querySelector('.progress').style.display = 'none';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    document.querySelector('.progress').style.display = 'none';
                });
        });

        document.getElementById('closeDialogButton').addEventListener('click', function() {
            dialog.close();
        });
    </script>
</body>
</html>
