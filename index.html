<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Desk</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #fireCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 40px rgba(255, 100, 0, 0.4);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin: 20px auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            color: #dc3545;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 20%, 40%, 60%, 100% { transform: scale(1); }
            10% { transform: scale(1.1); }
            30% { transform: scale(1.05); }
            50% { transform: scale(1.1); }
            70% { transform: scale(1.05); }
        }

        .neon {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: 50px;
            filter: drop-shadow(0 0 5px rgba(220,53,69,0.7))
                    drop-shadow(0 0 10px rgba(220,53,69,0.7))
                    drop-shadow(0 0 20px rgba(220,53,69,0.7));
        }

        .form-control {
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 8px rgba(255,100,0,0.5);
            border-color: #ff6400;
        }
        .form-control.field-highlight {
            border-color: #ff6400 !important;
            box-shadow: 0 0 12px rgba(255,100,0,0.7) !important;
            animation: fieldPulse 0.5s ease;
        }
        @keyframes fieldPulse {
            0% { box-shadow: 0 0 0 rgba(255,100,0,0); }
            50% { box-shadow: 0 0 20px rgba(255,100,0,0.9); }
            100% { box-shadow: 0 0 12px rgba(255,100,0,0.7); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6400, #dc3545);
            border: none;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #dc3545, #ff6400);
        }

        .progress-msg {
            display: none;
            text-align: center;
            margin: 10px 0;
            color: #dc3545;
            font-weight: bold;
        }

        @media (max-width: 414px) {
            .form-container { padding: 15px; }
            h2 { font-size: 1.5rem; }
        }

        /* ── ROBOT ── */
        #robot-container {
            position: fixed;
            bottom: 0;
            left: -160px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.05s linear;
            pointer-events: none;
        }

        /* Speech bubble */
        .speech-bubble {
            background: #ffffff;
            border: 2.5px solid #ff6400;
            border-radius: 14px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #1a1a2e;
            max-width: 200px;
            text-align: center;
            position: relative;
            margin-bottom: 8px;
            box-shadow: 0 3px 12px rgba(255,100,0,0.35);
            line-height: 1.4;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .speech-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #ff6400;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #ffffff;
            z-index: 1;
        }

        /* Robot SVG legs animation */
        @keyframes legSwingL {
            0%,100% { transform: rotate(-22deg); }
            50%      { transform: rotate(22deg); }
        }
        @keyframes legSwingR {
            0%,100% { transform: rotate(22deg); }
            50%      { transform: rotate(-22deg); }
        }
        @keyframes armSwingL {
            0%,100% { transform: rotate(18deg); }
            50%      { transform: rotate(-18deg); }
        }
        @keyframes armSwingR {
            0%,100% { transform: rotate(-18deg); }
            50%      { transform: rotate(18deg); }
        }
        @keyframes eyeBlink {
            0%,93%,100% { transform: scaleY(1); }
            96%          { transform: scaleY(0.1); }
        }
        @keyframes antennaBob {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-3px); }
        }
        @keyframes bodyBob {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-2px); }
        }

        .robot-body-group { animation: bodyBob 0.45s ease-in-out infinite; }
        .leg-left         { transform-origin: 50% 2%; animation: legSwingL 0.45s ease-in-out infinite; }
        .leg-right        { transform-origin: 50% 2%; animation: legSwingR 0.45s ease-in-out infinite; }
        .arm-left         { transform-origin: 90% 15%; animation: armSwingL 0.45s ease-in-out infinite; }
        .arm-right        { transform-origin: 10% 15%; animation: armSwingR 0.45s ease-in-out infinite; }
        .eye-group        { animation: eyeBlink 4s ease-in-out infinite; }
        .antenna-tip      { animation: antennaBob 1s ease-in-out infinite; }

        /* When idle (arrived) – stop walking */
        #robot-container.idle .leg-left,
        #robot-container.idle .leg-right { animation: none; }
        #robot-container.idle .arm-left,
        #robot-container.idle .arm-right { animation: none; }
        #robot-container.idle .robot-body-group { animation: none; }
    </style>
</head>
<body>

<canvas id="fireCanvas"></canvas>

<!-- ── ROBOT ── -->

    <div class="speech-bubble" id="speechBubble">👋 Hi! Please fill the form carefully.</div>

            <circle cx="50" cy="76" r="6" fill="#44dd44" opacity="0.9"/>
            <circle cx="50" cy="76" r="3" fill="#88ff88" opacity="0.6"/>

                <rect x="53" y="121" width="24" height="8" rx="4" fill="#2c5f9e"/>

</div>

<!-- ── FORM ── -->
<div class="form-container">
    <h2>HIPL SUPPORT DESK</h2>

    <svg class="neon" viewBox="0 0 600 100">
        <path fill="none" stroke="#dc3545" stroke-width="5"

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
/* ══════════════════════════════════════════════
   FIRE / SPARK PARTICLE SYSTEM
══════════════════════════════════════════════ */
const canvas = document.getElementById('fireCanvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const particles = [];

function spawnSpark(x, y) {
    const count = Math.floor(Math.random() * 3) + 2;
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (Math.random() * 3 + 2),
            life: 1, decay: Math.random() * 0.015 + 0.008,
            size: Math.random() * 4 + 2, hue: Math.random() * 40,
            type: Math.random() > 0.5 ? 'spark' : 'ember'
        });
    }
}

function spawnFlame(x, y) {
    particles.push({
        x, y, vx: (Math.random() - 0.5) * 1.5, vy: -(Math.random() * 3 + 2),
        life: 1, decay: Math.random() * 0.012 + 0.006,
        size: Math.random() * 12 + 6, hue: Math.random() * 40, type: 'flame'
    });
}

function spawnBurst() {
    const sources = [
        { x: Math.random() * 80 + 10, y: canvas.height },
        { x: canvas.width - Math.random() * 80 - 10, y: canvas.height },
        { x: canvas.width / 2 + (Math.random() - 0.5) * 100, y: canvas.height }
    ];
    const src = sources[Math.floor(Math.random() * sources.length)];
    spawnSpark(src.x, src.y);
    spawnFlame(src.x, src.y);
}

function animateFire() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy -= 0.05; p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save(); ctx.globalAlpha = p.life * 0.85;
        if (p.type === 'flame') {
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life);
            g.addColorStop(0, `hsla(${60 - p.hue},100%,90%,1)`);
            g.addColorStop(0.4, `hsla(${30 - p.hue},100%,60%,0.8)`);
            g.addColorStop(1, `hsla(${p.hue},100%,30%,0)`);
            ctx.fillStyle = g; ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
        } else if (p.type === 'spark') {
            ctx.strokeStyle = `hsla(${60 - p.hue * p.life},100%,70%,1)`;
            ctx.lineWidth = p.size * 0.3; ctx.shadowBlur = 6;
            ctx.shadowColor = `hsla(${p.hue},100%,60%,0.8)`;
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3); ctx.stroke();
        } else {
            ctx.fillStyle = `hsla(${p.hue * 2},100%,65%,1)`;
            ctx.shadowBlur = 8; ctx.shadowColor = `hsla(${p.hue},100%,50%,0.9)`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
    if (particles.length < 300) spawnBurst();
    requestAnimationFrame(animateFire);
}
animateFire();

/* ══════════════════════════════════════════════
   ROBOT GUIDE SYSTEM
══════════════════════════════════════════════ */
const robotEl   = document.getElementById('robot-container');
const bubbleEl  = document.getElementById('speechBubble');

/* Field instructions */
const fieldGuide = [
    { id: 'name',        msg: '📝 Enter your full name here.' },
    { id: 'phone',       msg: '📞 Type your 10-digit phone number.' },
    { id: 'email',       msg: '📧 Provide a valid email address.' },
    { id: 'plant',       msg: '🏭 Select your plant / unit from the list.' },
    { id: 'department',  msg: '🏢 Pick the department you belong to.' },
    { id: 'requestType', msg: '🔧 What type of IT issue are you facing?' },
    { id: 'priority',    msg: '⚡ Set the urgency: High, Medium or Low.' },
    { id: 'workByName',  msg: '👷 Choose the technician assigned to this.' },
    { id: 'description', msg: '✍️ Describe the problem clearly & briefly.' },
];

/* Robot position & walk state */
let robotLeft   = -160;   // px from left edge of viewport
let targetLeft  = 20;     // final resting position
let walkSpeed   = 4;      // px per frame
let isWalking   = true;
let guideActive = false;

function setRobotPos(x) {
    robotLeft = x;
    robotEl.style.left = x + 'px';
}

function showBubble(text) {
    bubbleEl.classList.remove('visible');
    setTimeout(() => {
        bubbleEl.textContent = text;
        bubbleEl.classList.add('visible');
    }, 150);
}

function hideBubble() {
    bubbleEl.classList.remove('visible');
}

/* Walk robot in from left */
function walkIn() {
    if (robotLeft < targetLeft) {
        setRobotPos(robotLeft + walkSpeed);
        requestAnimationFrame(walkIn);
    } else {
        setRobotPos(targetLeft);
        isWalking = false;
        robotEl.classList.add('idle');
        showBubble('👋 Hi! I\'m your form guide robot. Let me walk you through!');
        setTimeout(startGuide, 1800);
    }
}

/* Highlight a form field */
function highlightField(id) {
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('field-highlight'));
    const el = document.getElementById(id);
    if (el) {
        el.classList.add('field-highlight');
        /* Scroll field into view smoothly */
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

/* Move robot vertically to track the current field */
function moveRobotToField(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    /* Robot bottom should be at or just below the field center */
    const fieldCenterY = rect.top + rect.height / 2 + window.scrollY;
    /* Robot is 130px tall; position its bottom at fieldCenterY + 65 */
    const newBottom = window.innerHeight - (fieldCenterY + 80);
    const clampedBottom = Math.max(0, Math.min(newBottom, window.innerHeight - 160));
    robotEl.style.bottom = clampedBottom + 'px';
    robotEl.style.top = 'auto';
}

/* Sequential field guide */
function startGuide() {
    guideActive = true;
    let i = 0;

    function nextField() {
        if (i >= fieldGuide.length) {
            /* All fields done */
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('field-highlight'));
            robotEl.style.bottom = '0';
            robotEl.style.top = 'auto';
            showBubble('✅ Fill all fields & hit Submit! I\'m cheering for you! 🎉');
            return;
        }
        const entry = fieldGuide[i];
        showBubble(entry.msg);
        highlightField(entry.id);
        moveRobotToField(entry.id);
        i++;
        setTimeout(nextField, 2400);
    }
    nextField();
}

/* Focus listener: robot reacts when user clicks a field */
fieldGuide.forEach(entry => {
    const el = document.getElementById(entry.id);
    if (!el) return;
    el.addEventListener('focus', () => {
        showBubble(entry.msg);
        highlightField(entry.id);
        moveRobotToField(entry.id);
    });
    el.addEventListener('blur', () => {
        el.classList.remove('field-highlight');
    });
});

/* Kick off walk-in after short delay */
setTimeout(walkIn, 500);

/* ══════════════════════════════════════════════
   FORM SUBMISSION
══════════════════════════════════════════════ */
const dialog    = document.getElementById('submissionDialog');
const scriptURL = 'https://script.google.com/macros/s/AKfycbwPXBRq1sIyR-ch6rG8YfBLG9vpZE8FvKX89bkzCCZ0pVfRPTNHkR3QEVslA1FbV-IA4g/exec';
const form      = document.forms['requestForm'];

form.addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('progressMsg').style.display = 'block';
    showBubble('⏳ Sending your request...');
    fetch(scriptURL, { method: 'POST', body: new FormData(form) })
        .then(function() {
            form.reset();
            document.getElementById('requestForm').style.display = 'none';
            document.getElementById('progressMsg').style.display = 'none';
            dialog.showModal();
            showBubble('🎊 Request submitted! Great job!');
        })
        .catch(function(error) {
            console.error('Error!', error.message);
            document.getElementById('progressMsg').style.display = 'none';
            showBubble('❌ Oops! Submission failed. Try again.');
        });
});

document.getElementById('closeDialogButton').addEventListener('click', function() {
    dialog.close();
});
</script>
</body>
</html>
